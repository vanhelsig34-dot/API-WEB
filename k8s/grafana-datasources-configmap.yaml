apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cide-app
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-service:3100
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo-service:3200
