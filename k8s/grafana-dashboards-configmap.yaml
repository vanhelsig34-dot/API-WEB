apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: cide-app
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: 'Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  nodejs.json: |
    {
      "title": "Node.js Application Metrics",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests (Total)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(http_requests_total[1m])",
              "legendFormat": "{{method}} {{route}} ({{status_code}})"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Requests Processed",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(http_requests_total)"
            }
          ]
        }
      ]
    }
