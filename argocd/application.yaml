apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/USER/API-WEB.git # UPDATE THIS with your actual Git URL
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: cide-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
